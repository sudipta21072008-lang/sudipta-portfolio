<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawaii AI Lab v4 Ultra</title>

<style>

/* ================= BASE ================= */
body{
margin:0;
font-family:Arial;
background:#fff;
overflow-x:hidden;
color:#333;
}

/* ================= BACKGROUND ================= */
#bg{
position:fixed;
inset:0;
z-index:-3;
background:
radial-gradient(circle at 20% 20%, #ffd6e7, transparent 40%),
radial-gradient(circle at 80% 30%, #d6e4ff, transparent 40%),
radial-gradient(circle at 50% 80%, #d9ffe7, transparent 40%),
linear-gradient(135deg,#fff7fb,#f3f7ff);
}

/* blobs */
.blob{
position:fixed;
width:260px;
height:260px;
border-radius:50%;
filter:blur(75px);
opacity:0.35;
animation:floatBlob 10s ease-in-out infinite alternate;
}

.blob1{background:#ffb6d5;top:10%;left:10%;}
.blob2{background:#a7c7ff;bottom:10%;right:10%;}
.blob3{background:#b7ffd4;top:50%;left:55%;}

@keyframes floatBlob{
0%{transform:translate(0,0);}
100%{transform:translate(40px,-30px);}
}

/* sparkles */
.sparkle{
position:fixed;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.6;
box-shadow:0 0 10px rgba(255,255,255,0.6);
animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{transform:scale(0.5);opacity:0.3;}
50%{transform:scale(1.3);opacity:1;}
}

/* ================= HEADER ================= */
header{
text-align:center;
padding:25px;
}

h1{
margin:0;
font-size:28px;
color:#ff6fae;
}

p{opacity:0.7;}

/* ================= INPUT ================= */
textarea{
width:90%;
height:180px;
display:block;
margin:20px auto;
padding:15px;
border-radius:14px;
border:1px solid rgba(0,0,0,0.1);
background:white;
outline:none;
resize:none;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* ================= BUTTON ================= */
button{
display:block;
margin:10px auto;
padding:12px 18px;
border:none;
border-radius:12px;
background:#ff6fae;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

/* ================= OUTPUT ================= */
#output{
max-width:1000px;
margin:auto;
padding:20px;
display:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.85);
border-radius:18px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(0,0,0,0.08);
}

h3{color:#ff6fae;}

/* FLOW */
.flow{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.node{
padding:10px 14px;
border-radius:10px;
background:#fff;
border:1px solid rgba(0,0,0,0.1);
}

/* AI BOX */
#aiBox{
margin-top:20px;
padding:15px;
border-radius:14px;
background:rgba(255,255,255,0.9);
border:1px solid rgba(0,0,0,0.08);
}

/* ================= STICKERS ================= */
.sticker{
position:fixed;
font-size:28px;
pointer-events:none;
z-index:-1;
animation:floatSticker linear infinite;
opacity:0.8;
}

@keyframes floatSticker{
0%{transform:translateY(110vh) rotate(0deg);opacity:0;}
10%{opacity:0.9;}
100%{transform:translateY(-120vh) rotate(360deg);opacity:0;}
}

.corner{
position:fixed;
font-size:60px;
opacity:0.18;
z-index:-1;
}

.corner1{top:20px;left:20px;}
.corner2{top:20px;right:20px;}
.corner3{bottom:20px;left:20px;}
.corner4{bottom:20px;right:20px;}

</style>
</head>

<body>

<div id="bg"></div>

<div class="corner corner1">🌸</div>
<div class="corner corner2">🧬</div>
<div class="corner corner3">☁️</div>
<div class="corner corner4">✨</div>

<header>
<h1>🌸 AI Research Analyzer</h1>
<p>AI-powered research analyzer system</p>
</header>

<textarea id="input" placeholder="Paste your research paper..."></textarea>
<button onclick="analyze()">Analyze ✨</button>

<div id="output">

<h2 style="text-align:center;color:#ff6fae;">Research Report</h2>

<div class="grid">

<div class="card">
<h3> Abstract</h3>
<p id="abstract"></p>
</div>

<div class="card">
<h3> Methodology</h3>
<p id="method"></p>
</div>

<div class="card">
<h3> Results</h3>
<p id="results"></p>
</div>

<div class="card">
<h3> Conclusion</h3>
<p id="conclusion"></p>
</div>

</div>

<div id="aiBox">
<h3> AI Insight</h3>
<p id="ai"></p>
<p id="score"></p>
</div>

<div class="card" style="margin-top:20px;">
<h3> Flow</h3>
<div class="flow">
<div class="node">Hypothesis</div>
<div class="node">Experiment</div>
<div class="node">Data</div>
<div class="node">Result</div>
<div class="node">Conclusion</div>
</div>
</div>

</div>

<script>

/* BACKGROUND */
function blob(c,x,y){
let b=document.createElement("div");
b.className="blob "+c;
b.style.left=x+"%";
b.style.top=y+"%";
document.getElementById("bg").appendChild(b);
}

blob("blob1",10,20);
blob("blob2",70,60);
blob("blob3",40,30);

/* SPARKLES */
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(s);
}

/* STICKERS */
const stickers=["🌸","🧬","✨","🩷","🎀","☁️","🦋","🌷","💖","⭐"];

function createSticker(){
let s=document.createElement("div");
s.className="sticker";
s.innerText=stickers[Math.floor(Math.random()*stickers.length)];
s.style.left=Math.random()*100+"vw";
s.style.fontSize=(20+Math.random()*25)+"px";
s.style.animationDuration=(10+Math.random()*10)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),20000);
}
setInterval(createSticker,900);

/* AI */
function extract(t,k){
for(let x of k){
let i=t.toLowerCase().indexOf(x);
if(i!=-1)return t.substring(i,i+200);
}
return "Not found.";
}

function analyze(){
let t=document.getElementById("input").value;
if(t.length<10)return alert("Paste paper");

let a=extract(t,["abstract","intro"]);
let m=extract(t,["method","experiment"]);
let r=extract(t,["result","finding"]);
let c=extract(t,["conclusion"]);

document.getElementById("abstract").innerText=a;
document.getElementById("method").innerText=m;
document.getElementById("results").innerText=r;
document.getElementById("conclusion").innerText=c;

document.getElementById("ai").innerText=
"This AI detected structured research flow and scientific reasoning patterns.";

document.getElementById("score").innerText=
"Confidence: "+(80+Math.floor(Math.random()*15))+"%";

document.getElementById("output").style.display="block";
}

</script>

</body>
</html>
